<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>VastraFix Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --vf-blue: #00a9e0; --vf-green: #8cc63f; --vf-navy: #1e293b; }
        body { font-family: 'Inter', sans-serif; background-color: #f4f7f6; color: #333; }
        .sidebar { height: 100vh; background: var(--vf-navy); color: white; position: fixed; width: 240px; padding: 20px; z-index: 1000; }
        .main-content { margin-left: 240px; padding: 30px; min-height: 100vh; }
        .nav-link { color: #94a3b8; margin-bottom: 8px; border-radius: 8px; transition: 0.3s; display: flex; align-items: center; }
        .nav-link i { width: 25px; margin-right: 10px; font-size: 1.1rem; }
        .nav-link:hover, .nav-link.active { background: var(--vf-blue); color: white !important; }
        .logo-text { color: var(--vf-blue); font-weight: 700; font-size: 1.5rem; }
    </style>
</head>
<body>
    <div class="sidebar d-flex flex-column">
        <div class="text-center mb-5">
            <span class="logo-text">Vastra<span style="color: var(--vf-green);">Fix</span></span>
        </div>
        <ul class="nav flex-column mb-auto">
            <li class="nav-item">
                <a href="{% url 'custom_dashboard' %}" class="nav-link {% if request.resolver_match.url_name == 'custom_dashboard' %}active{% endif %}">
                    <i class="fas fa-chart-line"></i> Dashboard
                </a>
            </li>
            <li class="nav-item">
                <a href="{% url 'admin_users' %}?role=customer" class="nav-link {% if current_role == 'customer' %}active{% endif %}">
                    <i class="fas fa-users"></i> Customers
                </a>
            </li>
            <li class="nav-item">
                <a href="{% url 'admin_users' %}?role=partner" class="nav-link {% if current_role == 'partner' %}active{% endif %}">
                    <i class="fas fa-truck-pickup"></i> Partners
                </a>
            </li>
            <li class="nav-item">
                <a href="{% url 'admin_categories' %}" class="nav-link {% if request.resolver_match.url_name == 'admin_categories' %}active{% endif %}">
                    <i class="fas fa-th-list"></i> Categories
                </a>
            </li>
            <li class="nav-item">
                <a href="{% url 'admin_items' %}" class="nav-link {% if request.resolver_match.url_name == 'admin_items' %}active{% endif %}">
                    <i class="fas fa-tshirt"></i> Laundry Items
                </a>
            </li>
            <li class="nav-item">
                <a href="{% url 'admin_orders' %}" class="nav-link {% if request.resolver_match.url_name == 'admin_orders' %}active{% endif %}">
                    <i class="fas fa-box"></i> Orders
                </a>
            </li>
            <li class="nav-item">
                <a href="{% url 'admin_payouts' %}" class="nav-link {% if request.resolver_match.url_name == 'admin_payouts' %}active{% endif %}">
                    <i class="fas fa-wallet"></i> Payouts
                </a>
            </li>
            <li class="nav-item">
                <a href="{% url 'admin_bank_verifications' %}" class="nav-link {% if request.resolver_match.url_name == 'admin_bank_verifications' %}active{% endif %}">
                    <i class="fas fa-university"></i> Bank Verification
                </a>
            </li>
        </ul>
        <div class="mt-auto">
            <a href="{% url 'logout' %}" class="dropdown-item text-danger fw-bold"><i class="fas fa-sign-out-alt"></i> Logout</a>
        </div>
    </div>
    <div class="main-content">
        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-{% if message.tags == 'error' %}danger{% else %}{{ message.tags }}{% endif %} alert-dismissible fade show shadow-sm" role="alert" style="border-radius: 12px;">
                    {{ message }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
            {% endfor %}
        {% endif %}
        {% block content %}{% endblock %}
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        setTimeout(function() {
            let alerts = document.querySelectorAll('.alert');
            alerts.forEach(function(alert) {
                let bsAlert = new bootstrap.Alert(alert);
                bsAlert.close();
            });
        }, 3000);
    </script>
</body>
</html>
